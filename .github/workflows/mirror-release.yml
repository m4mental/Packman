name: KernelSU-Next GKI2 LKM Test Patcher

on:
  workflow_dispatch: # Strictly manual trigger par kaam karega test ke liye

permissions:
  contents: write # Releases banane ke liye permissions

jobs:
  ksun-patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl p7zip-full unzip python3

      - name: Fetch Latest Nothing Tag and GKI Modules
        id: fetch_urls
        run: |
          # 1. Nothing OS Archive se latest version tag dhoondhna
          REPO="spike0en/nothing_archive"
          CODENAME="Pacman"
          RELEASES=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/$REPO/releases")
          RELEASE_JSON=$(echo "$RELEASES" | jq --arg codename "$CODENAME" '[.[] | select(.tag_name | contains($codename))] | .[0]')
          LATEST_TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name')
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
          
          # 2. image-boot.7z download aur init_boot.img extract karna
          IMAGE_BOOT_URL=$(echo "$RELEASE_JSON" | jq -r '.assets[] | select(.name | contains("image-boot.7z")) | .browser_download_url')
          curl -L -o "image-boot.7z" "$IMAGE_BOOT_URL"
          7z x "image-boot.7z" -o"extracted_temp"
          find extracted_temp/ -type f -name "init_boot.img" -exec cp {} . \;
          rm -rf extracted_temp image-boot.7z

          # 3. KernelSU-Next ke latest modules aur APK download links dhoondhna
          KSUN_RELEASE=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/repos/KernelSU-Next/KernelSU-Next/releases/latest")
          KSUN_KO_URL=$(echo "$KSUN_RELEASE" | jq -r '.assets[] | select(.name == "android14-5.15_kernelsu.ko") | .browser_download_url')
          KSUN_APK_SPOOF=$(echo "$KSUN_RELEASE" | jq -r '.assets[] | select(.name | contains("spoofed") and contains(".apk")) | .browser_download_url' | head -n 1)
          
          # Normal .ko download karna
          curl -L -o kernelsu-next.ko "$KSUN_KO_URL"
          
          # Spoofed GKI Module extraction spoofed APK se
          if [ ! -z "$KSUN_APK_SPOOF" ] && [ "$KSUN_APK_SPOOF" != "null" ]; then
            curl -L -o ksun-spoofed.apk "$KSUN_APK_SPOOF"
            unzip -o ksun-spoofed.apk -d ksun_spoofed_unzipped
            SPOOF_KO_PATH=$(find ksun_spoofed_unzipped/ -type f -name "*5.15_kernelsu.ko" -o -name "*5.15*.ko" | head -n 1)
            if [ ! -z "$SPOOF_KO_PATH" ]; then
              cp "$SPOOF_KO_PATH" kernelsu-next-spoof.ko
            else
              cp kernelsu-next.ko kernelsu-next-spoof.ko
            fi
            rm -rf ksun_spoofed_unzipped ksun-spoofed.apk
          else
            cp kernelsu-next.ko kernelsu-next-spoof.ko
          fi

      - name: Set up magiskboot & ksud
        run: |
          # Setup magiskboot
          curl -L -o magiskboot "https://github.com/Uevo001/magiskboot-linux/raw/main/x86_64/magiskboot"
          chmod +x magiskboot
          
          # Setup stable ksud binary (Fede2782)
          curl -L -o ksud "https://github.com/Fede2782/KernelSU/releases/download/v1.0.5-legacy3/ksud-x86_64-unknown-linux-musl"
          chmod +x ksud

      - name: Patch init_boot.img with ksud
        run: |
          # Absolute paths ka use karke images patch karna (os error 2 se bachne ke liye)
          ./ksud boot-patch -b "$(pwd)/init_boot.img" -m "$(pwd)/kernelsu-next.ko" --magiskboot "$(pwd)/magiskboot" --kmi android14-5.15 -o "$(pwd)/KernelSU-Next-Normal-init_boot.img"
          ./ksud boot-patch -b "$(pwd)/init_boot.img" -m "$(pwd)/kernelsu-next-spoof.ko" --magiskboot "$(pwd)/magiskboot" --kmi android14-5.15 -o "$(pwd)/KernelSU-Next-Spoof-init_boot.img"

      - name: Create Test Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ksun-lkm-test
          name: KernelSU-Next GKI2 LKM Test (${{ env.LATEST_TAG }})
          body: |
            Test build of KernelSU-Next GKI2 LKM patched init_boot images.
            - Stock source build: ${{ env.LATEST_TAG }}
          files: |
            KernelSU-Next-Normal-init_boot.img
            KernelSU-Next-Spoof-init_boot.img
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
